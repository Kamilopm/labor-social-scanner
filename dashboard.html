<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Dashboard Labor Social</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 { 
            color: #1a73e8; 
            font-size: 32px;
            margin-bottom: 10px;
        }
        .fecha {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .btn-volver {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-volver:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(26,115,232,0.4); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .stat-number {
            font-size: 42px;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 10px;
        }
        .stat-label {
            color: #666;
            font-size: 16px;
            font-weight: 500;
        }
        .stat-card.alertas .stat-number { color: #c62828; }
        .stat-card.success .stat-number { color: #2e7d32; }
        
        .section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .section h2 {
            color: #1a73e8;
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #e0e0e0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: white;
            font-weight: 600;
        }
        tr:hover { background: #f5f5f5; }
        .numero {
            font-weight: bold;
            color: #1a73e8;
        }
        
        .chart-container {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        .bar {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .bar-label {
            width: 60px;
            font-weight: 600;
            color: #333;
        }
        .bar-progress {
            flex: 1;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 0 15px;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: 600;
            transition: width 0.5s;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 20px;
            color: white;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Dashboard Labor Social</h1>
            <p class="fecha" id="fechaActual">Cargando...</p>
            <a href="index.html" class="btn-volver">🔄 Actualizar Datos</a>
        </div>
        
        <div id="loading" class="loading">
            ⏳ Cargando datos...
        </div>
        
        <div id="content" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-number" id="totalEstudiantes">0</div>
                    <div class="stat-label">Total Estudiantes</div>
                </div>
                
                <div class="stat-card success">
                    <div class="stat-icon">✅</div>
                    <div class="stat-number" id="asistenciasHoy">0</div>
                    <div class="stat-label">Asistencias Hoy</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-number" id="asistenciasSemana">0</div>
                    <div class="stat-label">Esta Semana</div>
                </div>
                
                <div class="stat-card alertas">
                    <div class="stat-icon">🚨</div>
                    <div class="stat-number" id="totalAlertas">0</div>
                    <div class="stat-label">Alertas Activas</div>
                </div>
            </div>
            
            <div class="section">
                <h2>📈 Asistencias por Día de la Semana</h2>
                <div class="chart-container" id="chartDias"></div>
            </div>
            
            <div class="section">
                <h2>🏆 Top 5 Estudiantes con Más Asistencias</h2>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Estudiante</th>
                            <th>Asistencias</th>
                        </tr>
                    </thead>
                    <tbody id="tablaTop"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxs_eiAc9DtfSdRsWR8iI2V8eiJoaIT8QUzbliBkaGW28qQ5DQQypggm4JBQo8IcQe_/exec';

        function cargarDatos() {
            fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({ accion: 'obtenerDatosDashboard' })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('loading').innerHTML = '<div class="error">❌ ' + data.error + '</div>';
                    return;
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
                document.getElementById('fechaActual').innerText = data.fechaActual;
                document.getElementById('totalEstudiantes').innerText = data.totalEstudiantes;
                document.getElementById('asistenciasHoy').innerText = data.asistenciasHoy;
                document.getElementById('asistenciasSemana').innerText = data.asistenciasSemana;
                document.getElementById('totalAlertas').innerText = data.totalAlertas;
                
                generarGraficoDias(data.diasSemana, data.asistenciasPorDia);
                generarTablaTop(data.topEstudiantes);
            })
            .catch(error => {
                document.getElementById('loading').innerHTML = '<div class="error">❌ Error al cargar datos: ' + error + '</div>';
            });
        }
        
        function generarGraficoDias(dias, asistencias) {
            var maxAsistencias = Math.max.apply(null, asistencias);
            var html = '';
            
            for (var i = 0; i < dias.length; i++) {
                var porcentaje = maxAsistencias > 0 ? (asistencias[i] / maxAsistencias * 100) : 0;
                html += '<div class="bar">';
                html += '<div class="bar-label">' + dias[i] + '</div>';
                html += '<div class="bar-progress">';
                html += '<div class="bar-fill" style="width: ' + porcentaje + '%">' + asistencias[i] + '</div>';
                html += '</div>';
                html += '</div>';
            }
            
            document.getElementById('chartDias').innerHTML = html;
        }
        
        function generarTablaTop(topEstudiantes) {
            var html = '';
            
            if (topEstudiantes.length === 0) {
                html = '<tr><td colspan="3" style="text-align: center; color: #999;">No hay asistencias registradas</td></tr>';
            } else {
                for (var i = 0; i < topEstudiantes.length; i++) {
                    html += '<tr>';
                    html += '<td class="numero">' + (i + 1) + '</td>';
                    html += '<td>' + topEstudiantes[i][0] + '</td>';
                    html += '<td class="numero">' + topEstudiantes[i][1] + '</td>';
                    html += '</tr>';
                }
            }
            
            document.getElementById('tablaTop').innerHTML = html;
        }
        
        window.onload = cargarDatos;
    </script>
</body>
</html>
