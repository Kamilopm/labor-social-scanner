<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Labor Social</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f8; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .number { font-size: 2em; font-weight: bold; color: #1a73e8; }
        table { width: 100%; max-width: 1000px; margin: 20px auto; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #1a73e8; color: white; }
        .btn { display: inline-block; padding: 10px 20px; background: #1a73e8; color: white; text-decoration: none; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <a href="index.html" class="btn">📱 Volver al Escáner</a>
        <h1>📊 Dashboard Labor Social</h1>
        <p id="fechaActual">Cargando fecha...</p>
    </div>

    <div class="grid">
        <div class="card"><div class="number" id="totalEstudiantes">0</div>Total Estudiantes</div>
        <div class="card"><div class="number" id="asistenciasHoy">0</div>Asistencias Hoy</div>
        <div class="card"><div class="number" id="asistenciasSemana">0</div>Esta Semana</div>
        <div class="card"><div class="number" id="totalAlertas" style="color:red">0</div>Alertas Activas</div>
    </div>

    <h3 style="text-align: center; margin-top: 30px;">🏆 Top 5 Estudiantes</h3>
    <table id="tablaTop">
        <thead><tr><th>#</th><th>Estudiante</th><th>Asistencias</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/TU_ID_DE_IMPLEMENTACION/exec"; 

        async function cargarDatos() {
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ accion: 'obtenerDatosDashboard' })
                });
                const data = await response.json();
                
                if(data.error) { alert(data.error); return; }

                document.getElementById('fechaActual').innerText = data.fechaActual;
                document.getElementById('totalEstudiantes').innerText = data.totalEstudiantes;
                document.getElementById('asistenciasHoy').innerText = data.asistenciasHoy;
                document.getElementById('asistenciasSemana').innerText = data.asistenciasSemana;
                document.getElementById('totalAlertas').innerText = data.totalAlertas;

                const tbody = document.querySelector('#tablaTop tbody');
                tbody.innerHTML = '';
                data.topEstudiantes.forEach((item, index) => {
                    tbody.innerHTML += `<tr><td>${index + 1}</td><td>${item[0]}</td><td>${item[1]}</td></tr>`;
                });
            } catch (e) {
                console.error(e);
                alert("Error cargando datos. Verifica la consola.");
            }
        }
        cargarDatos();
    </script>
</body>
</html>
